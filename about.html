<!-- ===================== SHARED STYLES ===================== -->
<style>
:root { --primary:#5a3e2b; --accent:#c89b6d; --bg:#f4efe6; --card:#fff; --text:#2f2a24; }
body{margin:0;font-family:Inter,system-ui;background:var(--bg);color:var(--text);} 
header{background:var(--primary);color:#fff;padding:18px 22px;display:flex;justify-content:space-between;align-items:center}
.logo{font-weight:700}
nav a{color:#fff;margin-left:18px;text-decoration:none;opacity:.85}
nav a.active{opacity:1;border-bottom:2px solid var(--accent)}
.hero{padding:90px 20px;text-align:center;max-width:900px;margin:auto}
.hero h1{font-size:2.6em;margin-bottom:10px}
input{padding:12px;border-radius:6px;border:1px solid #ccc}
button{padding:12px 18px;border:none;border-radius:6px;background:var(--primary);color:#fff;cursor:pointer}
section{padding:70px 20px;max-width:1000px;margin:auto}
.features{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
.card{background:var(--card);padding:25px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,.08);transition:.25s}
.card:hover{transform:translateY(-5px)}
.highlight{background:#fff7ec;border-left:5px solid var(--primary);padding:20px;border-radius:8px}
footer{text-align:center;padding:30px;background:#e0d7c9;margin-top:40px}
</style>

<script>
function setActive(){
  const links=document.querySelectorAll('nav a');
  links.forEach(l=>{ if(location.pathname.endsWith(l.getAttribute('href'))) l.classList.add('active'); });
}
</script>
